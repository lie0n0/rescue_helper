<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Helper - 재난 구조 지원 시스템</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .badge {
            background: #238636;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }

        .role-selector {
            display: flex;
            gap: 12px;
        }

        .role-btn {
            padding: 10px 20px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #8b949e;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .role-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .role-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 73px);
        }

        .sidebar {
            width: 320px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .create-disaster-btn {
            width: 100%;
            padding: 12px;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .create-disaster-btn:hover {
            background: #2ea043;
        }

        .disaster-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .disaster-card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .disaster-card:hover {
            border-color: #58a6ff;
        }

        .disaster-card.active {
            border-color: #238636;
            background: #0d1117;
        }

        .disaster-card .type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .disaster-card .type.fire { background: #da3633; }
        .disaster-card .type.earthquake { background: #d29922; }
        .disaster-card .type.flood { background: #1f6feb; }
        .disaster-card .type.other { background: #8b949e; }

        .disaster-card .title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .disaster-card .meta {
            font-size: 12px;
            color: #8b949e;
        }

        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #1a1f2e;
        }

        .control-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            width: 280px;
            z-index: 1000;
        }

        .control-panel h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #21262d;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.online { background: #3fb950; }
        .status-dot.offline { background: #f85149; }

        .victim-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .victim-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #21262d;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .victim-item .info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .victim-item .battery {
            font-size: 12px;
            color: #8b949e;
        }

        .victim-item .distance {
            font-size: 12px;
            color: #f0883e;
            font-weight: 500;
        }

        .sos-btn {
            width: 100%;
            padding: 16px;
            background: #da3633;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .sos-btn:hover {
            background: #f85149;
            transform: scale(1.02);
        }

        .sos-btn:active {
            transform: scale(0.98);
        }

        .sos-btn.active {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(218, 54, 51, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(218, 54, 51, 0); }
        }

        .info-panel {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            max-width: 300px;
            z-index: 1000;
        }

        .info-panel .stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #30363d;
        }

        .info-panel .stat:last-child {
            border-bottom: none;
        }

        .info-panel .stat .label {
            color: #8b949e;
            font-size: 13px;
        }

        .info-panel .stat .value {
            font-weight: 600;
            font-size: 13px;
        }

        .notification {
            position: fixed;
            top: 90px;
            right: 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.alert {
            border-color: #f85149;
            background: #1c0c0c;
        }

        .notification.success {
            border-color: #3fb950;
            background: #0c1c0c;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
        }

        .modal h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .modal .form-group {
            margin-bottom: 16px;
        }

        .modal label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
        }

        .modal input:focus, .modal select:focus, .modal textarea:focus {
            outline: none;
            border-color: #1f6feb;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }

        .modal-actions .cancel {
            background: #21262d;
            color: #e6edf3;
        }

        .modal-actions .submit {
            background: #238636;
            color: white;
        }

        .connection-status {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #161b22;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-size: 12px;
            z-index: 1000;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>
            🚨 Rescue Helper
            <span class="badge">실시간 재난 구조 시스템</span>
        </h1>
        <div class="role-selector">
            <button class="role-btn active" onclick="setRole('rescuer', event)">🦺 구조자</button>
            <button class="role-btn" onclick="setRole('victim', event)">🆘 피구조자</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>재난 목록</h2>
                <button class="create-disaster-btn" onclick="openCreateModal()">
                    + 새 재난 생성
                </button>
            </div>
            <div class="disaster-list" id="disasterList">
                <div style="text-align: center; padding: 40px 20px; color: #8b949e;">
                    로딩 중...
                </div>
            </div>
        </aside>

        <main class="map-container">
            <div id="map"></div>

            <div class="control-panel" id="controlPanel">
                <h3>📡 실시간 모니터링</h3>
                
                <div class="status-indicator">
                    <div class="status-dot online" id="statusDot"></div>
                    <span id="statusText">서버 연결됨</span>
                </div>

                <div id="rescuerPanel" style="display: block;">
                    <div style="margin-top: 12px;">
                        <div style="font-size: 12px; color: #8b949e; margin-bottom: 8px;">피구조자 목록</div>
                        <div class="victim-list" id="victimList">
                            <div style="text-align: center; padding: 20px; color: #8b949e; font-size: 13px;">
                                피구조자가 없습니다
                            </div>
                        </div>
                    </div>
                </div>

                <div id="victimPanel" style="display: none;">
                    <div style="margin-top: 12px;">
                        <div class="status-indicator">
                            <span style="font-size: 12px;">📍 내 위치:</span>
                            <span id="myLocation" style="font-size: 12px; color: #58a6ff;">위치 확인 중...</span>
                        </div>
                        <div class="status-indicator">
                            <span style="font-size: 12px;">🔋 배터리:</span>
                            <span id="myBattery" style="font-size: 12px;">--</span>
                        </div>
                        <button class="sos-btn" id="sosBtn" onclick="toggleSos()">
                            🆘 SOS 호출
                        </button>
                    </div>
                </div>
            </div>

            <div class="info-panel" id="infoPanel">
                <div class="stat">
                    <span class="label">활성 재난</span>
                    <span class="value" id="activeDisasters">0</span>
                </div>
                <div class="stat">
                    <span class="label">총 구조자</span>
                    <span class="value" id="totalRescuers">0</span>
                </div>
                <div class="stat">
                    <span class="label">총 피구조자</span>
                    <span class="value" id="totalVictims">0</span>
                </div>
                <div class="stat">
                    <span class="label">완료된 구조</span>
                    <span class="value" id="completedRescues">0</span>
                </div>
            </div>

            <div class="connection-status">
                <div class="status-dot online" id="wsStatusDot"></div>
                <span id="wsStatusText">WebSocket 연결됨</span>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2>새 재난 생성</h2>
            <form onsubmit="createDisaster(event)">
                <div class="form-group">
                    <label>재난 유형</label>
                    <select id="disasterType" required>
                        <option value="fire">🔥 화재</option>
                        <option value="earthquake">🌋 지진</option>
                        <option value="flood">🌊 홍수</option>
                        <option value="collapse">🏚️ 붕괴</option>
                        <option value="other">⚠️ 기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>설명</label>
                    <textarea id="disasterDesc" rows="3" placeholder="재난 상황 설명..."></textarea>
                </div>
                <div class="form-group">
                    <label>반경 (미터)</label>
                    <input type="number" id="disasterRadius" value="500" min="100" max="5000">
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel" onclick="closeCreateModal()">취소</button>
                    <button type="submit" class="submit">생성</button>
                </div>
            </form>
        </div>
    </div>

    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

</body>
</html>
